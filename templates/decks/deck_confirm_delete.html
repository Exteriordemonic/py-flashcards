{% extends "base.html" %}

{% block header %}
  <header class="w-full flex items-center justify-between px-4 py-6 bg-base-200 border-b border-base-content/10 mb-4">
    <h1 class="text-3xl font-bold">Delete Deck</h1>
    <a href="{% url 'decks:deck-detail' pk=object.pk %}" class="btn btn-outline btn-sm">Back</a>
  </header>
{% endblock %}

{% block content %}
<div class="container mx-auto max-w-lg px-4">
  <div class="card bg-base-100 shadow-md border border-base-content/10 mt-8">
    <div class="card-body">
      <div class="alert alert-warning mb-4">
        <span>This action cannot be undone.</span>
      </div>
      <p class="mb-6">
        Are you sure you want to delete the deck
        <strong class="text-base-content">{{ object.name }}</strong>?
      </p>
      <form method="post" class="flex flex-col gap-4">
        {% csrf_token %}
        <div class="flex flex-wrap gap-2">
          <button type="submit" class="btn btn-error">Yes, delete</button>
          <a href="{% url 'decks:deck-detail' pk=object.pk %}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
