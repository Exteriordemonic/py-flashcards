{% extends "base.html" %}

{% block header %}
  <header class="w-full flex items-center justify-between px-4 py-6 bg-base-200 border-b border-base-content/10 mb-4">
    <h1 class="text-3xl font-bold">Decks</h1>
    <a href="{% url 'flashcards:deck-create' %}" class="btn btn-primary">
      Create Deck
    </a>
  </header>
{% endblock %}

{% block content %}
<div class="container p-4">
  <div class="overflow-x-auto rounded-box border border-base-content/5 bg-base-100">
      <table class="table">
        <!-- head -->
        <thead>
          <tr>
            <th></th>
            <th>Name</th>
            <th>Flashcards</th>
          </tr>
        </thead>
        <!-- body -->
        <tbody>
          {% for deck in object_list %}
          <tr>
              <td><a href="{% url "flashcards:deck-detail" pk=deck.id %}"> {{ deck.id }}</a></td>
              <td><a href="{% url "flashcards:deck-detail" pk=deck.id %}">{{ deck.name }}</a></td>
              <td>
                {{ deck.flashcards_count }}
              </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
</div>
{% endblock %}
